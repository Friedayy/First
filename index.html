<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .me {
            background-color: red;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 100px;
        }

        .you {
            background-color: white;
            color: blue;
            padding: 10px 20px;
            border: 1px solid blue;
            cursor: pointer;
            border-radius: 100px;
        }
    </style>
</head>
<body>
    <button class="me">
        Subscribe
    </button>
    <button class="you">
        twitter
    </button>
</body>
</html>
