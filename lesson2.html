<!DOCTYPE html>
<html lang="en">
<head>
    <title>Uber</title>
    <style>
        .me {
            background-color: black;
            color: white;
            border: none;
            padding: 12px;
            margin-right: 12px;
            margin-top: 12px;
            cursor: pointer;
            font-size: 20px;
        }

        .you {
            color: black;
            background-color: rgb(255, 216, 20);
            border: none;
            border-radius: 30px;
            padding: 12px;
            padding-left: 40px;
            padding-right: 40px;
            font-size: 20px;
            cursor: pointer;
            margin-right: 12px;
        }

        .him {
            background-color: rgb(46, 164, 79);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 20px;
            cursor: pointer;
            padding-left: 20px;
            padding-right: 20px;
            font-style: Arial;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <button class="me">
        Request now
    </button>
    <button class="you">
        Add to Cart
    </button>
    <button class="him">
        Sign up
    </button>
</body>
</html>
